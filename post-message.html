<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Message</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/post-message.css">
</head>
<body>
  <main>
    <h1>Post a Message</h1>
    <p>Enter a message and submit it to the remote endpoint.</p>

    <form id="messageForm">
      <label for="messageInput">Message</label>
      <textarea id="messageInput" name="message" rows="4" required placeholder="Write your message here..."></textarea>
      <button type="submit">Send Message</button>
    </form>

    <div id="status" aria-live="polite"></div>
  </main>

  <script src="js/post-message.js"></script>
  
</body>
</html>
