<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="css/converter.css">
</head>
<body>

    <!-- App Bar -->
    <div class="app-bar">
        <div class="menu-icon">☰</div>
        <div class="logo"><span>Unit</span> Converter</div>
    </div>

    <!-- Category Tabs -->
    <div class="tabs" id="tabs">
        <div class="tab active" data-category="temperature">Temperature</div>
        <div class="tab" data-category="length">Length</div>
        <div class="tab" data-category="weight">Weight</div>
        <div class="tab" data-category="volume">Volume</div>
        <div class="tab" data-category="area">Area</div>
        <div class="tab" data-category="speed">Speed</div>
        <div class="tab" data-category="time">Time</div>
        <div class="tab" data-category="data">Data</div>
    </div>

    <!-- Converter Card -->
    <div class="card">
        <div class="card-title" id="cardTitle">Temperature</div>

        <div class="row">
            <input type="text" id="fromVal" inputmode="decimal" autofocus placeholder="0">
            <select id="fromUnit"></select>
        </div>

        <div class="swap-area">
            <button class="swap-btn" id="swapBtn" title="Swap units">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5f6368" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <polyline points="19 12 12 19 5 12"/>
                </svg>
            </button>
        </div>

        <div class="row">
            <input type="text" id="toVal" inputmode="decimal" readonly placeholder="0">
            <select id="toUnit"></select>
        </div>

        <div class="bottom-row">
            <button class="clear-btn" id="clearBtn">Clear</button>
            <span class="formula-text" id="formulaText"></span>
        </div>
    </div>

    <script src="js/converter.js"></script>
</body>
</html>
